name: Bug report
description: Report a problem with Sanctuary
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `pnpm dev`
        2. Open Journal
        3. ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. Ubuntu 24.04, Node 22, Electron desktop
    validations:
      required: true
