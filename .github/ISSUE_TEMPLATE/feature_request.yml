name: Feature request
description: Suggest an improvement for Sanctuary
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope
      options:
        - label: This fits Sanctuary's local-only, single-user design
          required: true
