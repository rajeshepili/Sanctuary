name: Build & Release Desktop Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for release (e.g. v1.0.0). Leave empty to use package.json version.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # -----------------------------
  # BUILD ALL PLATFORMS
  # -----------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_args: --mac dmg
          - os: windows-latest
            build_args: --win nsis
          - os: ubuntu-latest
            build_args: --linux AppImage deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      - name: Build Electron main process
        run: pnpm desktop:build:main

      - name: Generate desktop icon
        run: pnpm desktop:icon

      - name: Build Electron app
        run: pnpm exec electron-builder ${{ matrix.build_args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          path: |
            dist-electron/**/*.exe
            dist-electron/**/*.dmg
            dist-electron/**/*.AppImage
            dist-electron/**/*.deb
            dist-electron/**/*.yml
            dist-electron/**/*.blockmap
          retention-days: 3

  # -----------------------------
  # CREATE GITHUB RELEASE
  # -----------------------------
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: package.json
          sparse-checkout-cone-mode: false

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-files
          merge-multiple: true
          pattern: build-*

      - name: Determine Tag Name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag_name }}" ]; then
            echo "name=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "name=v$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Sanctuary ${{ steps.tag.outputs.name }}
          draft: true
          generate_release_notes: true
          files: |
            release-files/*.exe
            release-files/*.dmg
            release-files/*.AppImage
            release-files/*.deb
            release-files/*.yml
            release-files/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
